# Tiny Tapeout project information
project:
  title:        "SAP 8 bit Computer"      # Project title
  author:       "Navneet Prasad, Mohammed Riyaj J, Akash P, Vikash R"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "The processor is constructed using a collection of independent, well-defined hardware modules that together form a complete and functional CPU"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     10000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_8bitcustomcomputer"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "alu.v"
    - "cpu_core.v"
    - "cpu_top.v"
    - "ctrl_unit.v"
    - "flag_reg.v"
    - "inp_reg.v"
    - "MAR_reg.v"
    - "PC.v"
    - "RAM.v"
    - "reg_a.v"
    - "reg_b.v"
    - "reg_IR.v"
    - "reg_OUT.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "PGRM"
  ui[1]: "START"
  ui[2]: "INP_LD"
  ui[3]: "RAM_LD"
  ui[4]: "ADDR_0"
  ui[5]: "ADDR_1"
  ui[6]: "ADDR_2"
  ui[7]: "ADDR_3"

  # Outputs
  uo[0]: ""
  uo[1]: ""
  uo[2]: "PC_0"
  uo[3]: "PC_1"
  uo[4]: "PC_2"
  uo[5]: "PC_3"
  uo[6]: "HLT"
  uo[7]: "INP_SIG"

  # Bidirectional pins
  uio[0]: "D0"
  uio[1]: "D1"
  uio[2]: "D2"
  uio[3]: "D3"
  uio[4]: "D4"
  uio[5]: "D5"
  uio[6]: "D6"
  uio[7]: "D7"

# Do not change!
yaml_version: 6
